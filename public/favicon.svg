<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background tile, matching app header colour -->
  <rect width="32" height="32" rx="6" fill="#1C3A5E"/>

  <!-- Three metro lines meeting at a central interchange — one horizontal,
       two diagonals. All three are geometrically precise: the diagonals
       from (7,3)→(25,29) and (25,3)→(7,29) cross the horizontal y=16
       exactly at x=16, so all three meet at (16,16). -->

  <!-- Victoria line — horizontal, cyan -->
  <line x1="2"  y1="16" x2="30" y2="16" stroke="#0098D4" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Bakerloo line — NW→SE diagonal, brown -->
  <line x1="7"  y1="3"  x2="25" y2="29" stroke="#B36305" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Central line — NE→SW diagonal, red -->
  <line x1="25" y1="3"  x2="7"  y2="29" stroke="#E32017" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Interchange ring at the triple crossing point -->
  <circle cx="16" cy="16" r="5.5" fill="white" stroke="#1C3A5E" stroke-width="1.5"/>

  <!-- Terminal station dots -->
  <circle cx="2"  cy="16" r="2.5" fill="#0098D4" stroke="white" stroke-width="1"/>
  <circle cx="30" cy="16" r="2.5" fill="#0098D4" stroke="white" stroke-width="1"/>
  <circle cx="7"  cy="3"  r="2.5" fill="#B36305" stroke="white" stroke-width="1"/>
  <circle cx="25" cy="29" r="2.5" fill="#B36305" stroke="white" stroke-width="1"/>
  <circle cx="25" cy="3"  r="2.5" fill="#E32017" stroke="white" stroke-width="1"/>
  <circle cx="7"  cy="29" r="2.5" fill="#E32017" stroke="white" stroke-width="1"/>
</svg>
